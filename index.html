<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDTERM Quiz - Modules 5-8</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ===== BACKGROUND & GLITTERS ===== */
        body {
            background: linear-gradient(135deg, #2d1b4e 0%, #6b3fa0 50%, #f5e6ff 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        .glitter {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* ===== CONTAINER STYLING ===== */
        .quiz-container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin: 30px 0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .section-header h2 {
            color: #4b2c7a;
            margin: 0;
            font-weight: 700;
        }

        /* ===== QUESTION CARD ===== */
        .question-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .question-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .question-number {
            background: #6b3fa0;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 16px;
            font-weight: 600;
            color: #2d1b4e;
            margin-bottom: 15px;
        }

        /* ===== CLICKABLE OPTIONS (NO RADIO) ===== */
        .option-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
        }

        .option-card:hover {
            border-color: #6b3fa0;
            background: #f8f5ff;
        }

        .option-card.selected {
            border-color: #6b3fa0;
            background: #6b3fa0;
            color: white;
        }

        .option-card.correct {
            border-color: #28a745 !important;
            background: #28a745 !important;
            color: white !important;
        }

        .option-card.wrong {
            border-color: #dc3545 !important;
            background: #dc3545 !important;
            color: white !important;
        }

        /* ===== INPUT FIELDS ===== */
        .answer-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .answer-input:focus {
            outline: none;
            border-color: #6b3fa0;
            box-shadow: 0 0 10px rgba(107, 63, 160, 0.3);
        }

        .answer-input.correct {
            border-color: #28a745;
            background: #d4edda;
        }

        .answer-input.wrong {
            border-color: #dc3545;
            background: #f8d7da;
        }

        /* ===== EXPLANATION BOX ===== */
        .explanation-box {
            background: #f8f9fa;
            border-left: 4px solid #6b3fa0;
            padding: 15px;
            margin-top: 15px;
            border-radius: 5px;
            display: none;
            font-size: 14px;
            line-height: 1.6;
        }

        .explanation-box.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .explanation-title {
            font-weight: 700;
            color: #4b2c7a;
            margin-bottom: 8px;
        }

        .correct-answer-box {
            background: #d4edda;
            border: 2px solid #28a745;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            font-weight: 600;
            color: #155724;
        }

        .correct-answer-label {
            font-weight: 700;
            color: #28a745;
            margin-bottom: 5px;
        }

        /* ===== SCORE BANNER ===== */
        .score-banner {
            background: linear-gradient(135deg, #6b3fa0, #4b2c7a);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: none;
        }

        .score-banner.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .score-number {
            font-size: 48px;
            font-weight: 700;
        }

        .score-text {
            font-size: 18px;
            opacity: 0.9;
        }

        /* ===== BUTTONS ===== */
        .btn-quiz {
            background: linear-gradient(135deg, #6b3fa0, #4b2c7a);
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-quiz:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(107, 63, 160, 0.4);
            color: white;
        }

        .btn-retake {
            background: linear-gradient(135deg, #28a745, #218838);
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            color: white;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-retake:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.4);
            color: white;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .quiz-container {
                padding: 20px 10px;
            }
            .question-card {
                padding: 15px;
            }
            .score-number {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <!-- Glitter Background -->
    <div id="glitter-container"></div>

    <div class="quiz-container">
        <!-- Score Banner -->
        <div class="score-banner" id="score-banner">
            <div class="score-number" id="score-display">0/60</div>
            <div class="score-text" id="score-message">Keep practicing!</div>
            <button class="btn-retake" onclick="retakeQuiz()">🔄 Retake Quiz</button>
        </div>

        <!-- Part 1: Multiple Choice (1-30) -->
        <div class="section-header">
            <h2>📝 Part 1: Multiple Choice (1-30)</h2>
        </div>
        <div id="mc-questions"></div>

        <!-- Part 2: Identification (31-40) -->
        <div class="section-header">
            <h2>🔍 Part 2: Identification (31-40)</h2>
        </div>
        <div id="id-questions"></div>

        <!-- Part 3: Enumeration (41-50) -->
        <div class="section-header">
            <h2>📋 Part 3: Enumeration (41-50)</h2>
        </div>
        <div id="enum-questions"></div>

        <!-- Part 4: True/False (51-60) -->
        <div class="section-header">
            <h2>✅ Part 4: True or False (51-60)</h2>
        </div>
        <div id="tf-questions"></div>

        <!-- Submit Button -->
        <div class="text-center mt-5">
            <button class="btn-quiz" onclick="submitQuiz()">📤 Submit Answers</button>
        </div>
    </div>

    <script>
        // ===== CREATE GLITTERS =====
        function createGlitters() {
            const container = document.getElementById('glitter-container');
            for (let i = 0; i < 50; i++) {
                const glitter = document.createElement('div');
                glitter.className = 'glitter';
                glitter.style.left = Math.random() * 100 + 'vw';
                glitter.style.top = Math.random() * 100 + 'vh';
                glitter.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(glitter);
            }
        }

        // ===== QUESTION DATA =====
        const questions = {
            mc: [
                { q: "What does CSS stand for in web development?", options: ["Computer Style Sheets", "Cascading Style Sheets", "Creative Style System", "Colorful Style Sheets"], answer: 1, explanation: "According to Module 5, CSS stands for 'Cascading Style Sheet.' It is used to format the layout of web pages, defining text styles, table sizes, and other aspects previously defined only in HTML." },
                { q: "Which CSS property is used to create rounded corners on an element?", options: ["border-corner", "border-round", "border-radius", "corner-style"], answer: 2, explanation: "Module 5 states that the border-radius property allows you to give any element 'rounded corners.' Properties like border-corner do not exist in standard CSS3." },
                { q: "In CSS3, which property allows you to specify an image to be used as the border around an element?", options: ["border-image", "border-source", "background-border", "image-border"], answer: 0, explanation: "The border-image property allows you to specify an image to be used as the border. This is different from background-image, which fills the inside of the element." },
                { q: "Which CSS property is used to add shadow to text?", options: ["box-shadow", "text-shadow", "font-shadow", "color-shadow"], answer: 1, explanation: "Module 5 distinguishes between text-shadow (for text) and box-shadow (for elements/boxes). Using text-shadow allows you to specify horizontal shadow, vertical shadow, blur, and color." },
                { q: "What rule is used to define 'own' fonts in CSS that are not installed on the user's computer?", options: ["@font-import", "@font-face", "@font-style", "@web-font"], answer: 1, explanation: "The @font-face rule is used to define web fonts. This allows designers to use fonts not installed on the user's computer by including the font file on the web server." },
                { q: "Which CSS transform method moves an element from its current position according to X and Y axis parameters?", options: ["rotate()", "scale()", "translate()", "skew()"], answer: 2, explanation: "The translate() method moves an element from its current position based on parameters given for the X-axis and Y-axis. rotate() turns it, scale() sizes it, and skew() distorts it." },
                { q: "Which CSS property allows animation of HTML elements without using JavaScript?", options: ["@transition", "@keyframes", "@animate", "@move"], answer: 1, explanation: "Module 5 states that CSS allows animation using the @keyframes rule. You bind the animation to an element using properties like animation-name. This reduces the need for JavaScript for simple visual effects." },
                { q: "What does the CSS box-sizing: border-box property do?", options: ["It removes the border from the element", "It includes padding and border in the element's total width and height", "It makes the box invisible", "It adds a shadow to the box"], answer: 1, explanation: "The box-sizing property allows us to include the padding and border in an element's total width and height. Without this, padding increases the total width, often breaking layouts." },
                { q: "Which JavaScript keyword is used to declare variables?", options: ["variable", "var", "dim", "let-only"], answer: 1, explanation: "Module 6 & 7 states that JavaScript uses the var keyword to declare variables. Variables are used to store data values. Understanding declaration is the first step in writing any script." },
                { q: "What symbol is used for single-line comments in JavaScript?", options: ["#", "<!-- -->", "//", "/* */"], answer: 2, explanation: "Code after double slashes // is treated as a comment in JavaScript. <!-- --> is for HTML, and /* */ is for multi-line comments in JS." },
                { q: "Which operator is used to assign values to variables in JavaScript?", options: ["==", "=", "===", ":="], answer: 1, explanation: "JavaScript uses the assignment operator = to assign values to variables. == is used for comparison. Confusing assignment with comparison is a common bug." },
                { q: "What is the output of 'John' + ' ' + 'Doe' in JavaScript?", options: ["JohnDoe", "John Doe", "Error", "'John' ' ' 'Doe'"], answer: 1, explanation: "This is string concatenation. The + operator joins strings together. The space in the middle ensures there is a gap between the names." },
                { q: "Which statement is used to perform different actions based on different conditions?", options: ["for loop", "if..else", "function", "var"], answer: 1, explanation: "The if..else statement supports conditional statements used to perform different actions based on different conditions. Loops repeat actions, but conditionals make decisions." },
                { q: "Which loop loops through the properties of an Object?", options: ["for loop", "for/in loop", "while loop", "do/while loop"], answer: 1, explanation: "The for/in loop loops through the properties of an Object. The standard for loop is typically for numbers/indices." },
                { q: "What keyword is used to exit a loop early?", options: ["stop", "exit", "break", "return"], answer: 2, explanation: "The break statement is used to exit a loop early, breaking out of the enclosing curly braces. This is useful when a condition is met and further iteration is unnecessary." },
                { q: "What is the correct syntax to define a function in JavaScript?", options: ["function:myFunction()", "function myFunction()", "def myFunction()", "create myFunction()"], answer: 1, explanation: "The most common way to define a function is by using the function keyword, followed by a unique function name and parentheses." },
                { q: "Which event occurs when a user clicks the left button of their mouse?", options: ["onmouse", "onclick", "onpress", "onclicker"], answer: 1, explanation: "The onclick event type occurs when a user clicks the left button of their mouse. It is the most frequently used event type for user interaction." },
                { q: "What are cookies used for in web browsing?", options: ["To eat while coding", "To maintain session information among different pages", "To speed up the internet", "To delete history"], answer: 1, explanation: "Module 6 & 7 explains that cookies are used to maintain session information among different pages because HTTP is a stateless protocol." },
                { q: "Which function prints the current web page?", options: ["document.print()", "window.print()", "printer.print()", "print.page()"], answer: 1, explanation: "The JavaScript print function window.print() prints the current web page when executed. It is called directly using an event like onclick." },
                { q: "In JavaScript, what does NaN stand for?", options: ["Not a Number", "New and Null", "No an Number", "Negative and Null"], answer: 0, explanation: "NaN is a JavaScript reserved word indicating that a number is not a legal number (e.g., trying to do arithmetic with a non-numeric string)." },
                { q: "How are JavaScript objects defined?", options: ["With parentheses ()", "With an object literal using curly braces {}", "With square brackets []", "With quotes ''"], answer: 1, explanation: "Module 8 states you define a JavaScript object with an object literal using curly braces {}. Inside, you use name:value pairs." },
                { q: "What keyword refers to the 'owner' of a function within an object?", options: ["self", "owner", "this", "me"], answer: 2, explanation: "In a function definition, this refers to the 'owner' of the function. For example, this.firstName means the firstName property of this object." },
                { q: "JavaScript numbers are always stored as what?", options: ["32-bit integers", "64-bit floating point", "16-bit short", "128-bit double"], answer: 1, explanation: "Module 8 states JavaScript numbers are always stored as double precision floating point numbers (64-bit), following the IEEE 754 standard." },
                { q: "Which property is used to find the length of a string?", options: ["size", "count", "length", "index"], answer: 2, explanation: "To find the length of a string, use the built-in length property. This is a common operation when validating input fields." },
                { q: "How do you create an array in JavaScript?", options: ["var arr = (1, 2, 3)", "var arr = {1, 2, 3}", "var arr = [1, 2, 3]", "var arr = <1, 2, 3>"], answer: 2, explanation: "Using an array literal with square brackets [] is the easiest way to create a JavaScript Array." },
                { q: "Which object allows you to perform mathematical tasks on numbers?", options: ["Number", "Calc", "Math", "Algorithm"], answer: 2, explanation: "The JavaScript Math object allows you to perform mathematical tasks (like Math.round(), Math.sqrt()). It is a built-in object." },
                { q: "What is a regular expression?", options: ["A type of variable", "A sequence of characters that forms a search pattern", "A math formula", "A CSS style"], answer: 1, explanation: "A regular expression is a sequence of characters that forms a search pattern, used for text search and replace operations." },
                { q: "What does DOM stand for?", options: ["Data Object Model", "Document Object Model", "Digital Ordinance Model", "Document Orientation Mode"], answer: 1, explanation: "The HTML DOM stands for Document Object Model. It is a standard for how to get, change, add, or delete HTML elements." },
                { q: "Which CSS property specifies if an element should be resizable by the user?", options: ["resize", "overflow", "user-size", "adjust"], answer: 0, explanation: "The resize property specifies if (and how) an element should be resizable by the user (e.g., resize: both)." },
                { q: "What happens if you access an object method without the () parentheses?", options: ["It executes the method", "It returns an error", "It returns the function definition", "It returns null"], answer: 2, explanation: "Module 8 states if you access a method without the () parentheses, it will return the function definition instead of executing the action." }
            ],
            id: [
                { q: "This CSS property allows you to add multiple background images for an element.", answer: "background-image", explanation: "Module 5 defines that CSS allows multiple background images through the background-image property." },
                { q: "This CSS property specifies the number of columns an element should be divided into.", answer: "column-count", explanation: "The column-count property is used in multi-column layout to divide text into specific numbers of columns." },
                { q: "This JavaScript statement handles multiway branches more efficiently than repeated if..else if statements.", answer: "switch", explanation: "The switch statement handles exactly this situation (multiple conditions on one variable) more efficiently than repeated if..else if." },
                { q: "This is a plain text data record used to maintain session information among different pages.", answer: "cookie", explanation: "Cookies are plain text data records used to maintain session information because HTTP is stateless." },
                { q: "This keyword specifies an expression to be evaluated without returning a value.", answer: "void", explanation: "void is an important keyword in JavaScript which can be used as a unary operator." },
                { q: "In JavaScript objects, these are name:value pairs contained within the object.", answer: "properties", explanation: "The name:value pairs in JavaScript objects are called properties." },
                { q: "This JavaScript reserved word indicates that a number is not a legal number.", answer: "NaN", explanation: "NaN stands for 'Not a Number'. It results from invalid math operations." },
                { q: "This built-in object allows you to perform tasks like rounding numbers or finding square roots.", answer: "Math", explanation: "The Math object includes methods like Math.round(), Math.pow(), and Math.sqrt()." },
                { q: "This W3C standard allows JavaScript to access and change all elements of an HTML document.", answer: "DOM", explanation: "The HTML DOM is a standard for how to get, change, add, or delete HTML elements." },
                { q: "This CSS property allows us to include the padding and border in an element's total width and height.", answer: "box-sizing", explanation: "The box-sizing property (specifically border-box) ensures that padding and border do not increase the total width/height." }
            ],
            enum: [
                { q: "Enumerate three (3) CSS 2D Transform Methods.", answer: ["translate()", "rotate()", "scale()", "skew()", "matrix()"], explanation: "Module 5 lists these methods under CSS 2D Transforms. They allow you to move, rotate, scale, and skew elements." },
                { q: "Enumerate three (3) types of JavaScript Loops.", answer: ["for", "for/in", "for/of", "while", "do/while"], explanation: "Module 6 & 7 lists these different kinds of loops. Each serves a purpose." },
                { q: "Enumerate two (2) ways to access object properties in JavaScript.", answer: ["Dot notation (object.property)", "Bracket notation (object['property'])"], explanation: "Module 8 shows you can access properties using objectName.propertyName or objectName['propertyName']." },
                { q: "Enumerate two (2) string methods often used with Regular Expressions.", answer: ["search()", "replace()"], explanation: "Module 8 states that in JavaScript, regular expressions are often used with search() and replace()." },
                { q: "Enumerate three (3) CSS animation properties.", answer: ["animation-name", "animation-duration", "animation-delay", "animation-iteration-count", "animation-direction"], explanation: "Module 5 lists these animation properties for controlling CSS animations." },
                { q: "Enumerate two (2) CSS shadow properties.", answer: ["text-shadow", "box-shadow"], explanation: "Module 5 covers both text-shadow and box-shadow for adding shadows." },
                { q: "Enumerate three (3) JavaScript data types.", answer: ["string", "number", "boolean", "object", "array"], explanation: "Module 8 covers these fundamental JavaScript data types." },
                { q: "Enumerate two (2) ways to create a Date object.", answer: ["new Date()", "new Date(year, month, day)"], explanation: "Module 8 shows multiple ways to create Date objects using the Date() constructor." },
                { q: "Enumerate three (3) CSS multi-column properties.", answer: ["column-count", "column-gap", "column-rule"], explanation: "Module 5 covers multi-column layout properties for newspaper-style layouts." },
                { q: "Enumerate two (2) JavaScript comment styles.", answer: ["// (single-line)", "/* */ (multi-line)"], explanation: "Module 6 & 7 shows single-line (//) and multi-line (/* */) comment styles." }
            ],
            tf: [
                { q: "CSS3 is divided into several separate documents called 'modules' instead of a single large specification.", answer: true, explanation: "Module 5 states that instead of defining all features in a single specification like CSS 2, CSS 3 is divided into several separate documents called 'modules'." },
                { q: "The border-radius property can only be applied to images, not divs.", answer: false, explanation: "The definition says you can give 'any element' rounded corners. It is commonly used on div elements, buttons, and images alike." },
                { q: "JavaScript variables are case-sensitive, so x and X are different variables.", answer: true, explanation: "Module 6 & 7 rules for variables state that JavaScript variables are case sensitive." },
                { q: "The break statement continues executing each statement in each of the following cases in a switch statement.", answer: false, explanation: "The break statements indicate the end of a particular case. If they were omitted, the interpreter would continue (fall-through)." },
                { q: "JavaScript has different types of numbers like integers, short, and long.", answer: false, explanation: "Module 8 states JavaScript has only one type of number. They are always stored as 64-bit floating point." },
                { q: "Strings in JavaScript must be written within quotes, either single or double.", answer: true, explanation: "Module 8 defines a JavaScript string as zero or more characters written inside quotes." },
                { q: "The Date object in JavaScript must be created using the new Date() constructor.", answer: true, explanation: "Module 8 states Date objects are created with the new Date() constructor." },
                { q: "The HTML DOM is a tree of Objects constructed by the browser when a web page is loaded.", answer: true, explanation: "Module 8 explains that when a web page is loaded, the browser creates a Document Object Model of the page constructed as a tree of Objects." },
                { q: "The void operator returns the value of the evaluated expression.", answer: false, explanation: "The void operator specifies an expression to be evaluated without returning a value." },
                { q: "CSS Animations require JavaScript to work.", answer: false, explanation: "Module 5 states CSS allows animation of HTML elements without using JavaScript or Flash." }
            ]
        };

        // ===== RENDER QUESTIONS =====
        function renderQuestions() {
            // Multiple Choice
            const mcContainer = document.getElementById('mc-questions');
            questions.mc.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `mc-${index}`;
                let optionsHTML = '';
                item.options.forEach((opt, optIndex) => {
                    optionsHTML += `<div class="option-card" onclick="selectOption('mc', ${index}, ${optIndex})">${opt}</div>`;
                });
                card.innerHTML = `
                    <div class="question-number">Question ${index + 1}</div>
                    <div class="question-text">${item.q}</div>
                    <div class="options-container">${optionsHTML}</div>
                    <div class="explanation-box" id="mc-exp-${index}">
                        <div class="explanation-title">💡 Explanation:</div>
                        <div>${item.explanation}</div>
                    </div>
                `;
                mcContainer.appendChild(card);
            });

            // Identification
            const idContainer = document.getElementById('id-questions');
            questions.id.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `id-${index}`;
                card.innerHTML = `
                    <div class="question-number">Question ${index + 31}</div>
                    <div class="question-text">${item.q}</div>
                    <input type="text" class="answer-input" id="id-input-${index}" placeholder="Type your answer here...">
                    <div class="explanation-box" id="id-exp-${index}">
                        <div class="correct-answer-box">
                            <div class="correct-answer-label">✅ Correct Answer:</div>
                            <div>${item.answer}</div>
                        </div>
                        <div class="explanation-title">💡 Explanation:</div>
                        <div>${item.explanation}</div>
                    </div>
                `;
                idContainer.appendChild(card);
            });

            // Enumeration
            const enumContainer = document.getElementById('enum-questions');
            questions.enum.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `enum-${index}`;
                const correctAnswersText = item.answer.join(', ');
                card.innerHTML = `
                    <div class="question-number">Question ${index + 41}</div>
                    <div class="question-text">${item.q}</div>
                    <input type="text" class="answer-input" id="enum-input-${index}" placeholder="Separate answers with commas (e.g., translate, rotate, scale)">
                    <div class="explanation-box" id="enum-exp-${index}">
                        <div class="correct-answer-box">
                            <div class="correct-answer-label">✅ Correct Answers:</div>
                            <div>${correctAnswersText}</div>
                        </div>
                        <div class="explanation-title">💡 Explanation:</div>
                        <div>${item.explanation}</div>
                    </div>
                `;
                enumContainer.appendChild(card);
            });

            // True/False
            const tfContainer = document.getElementById('tf-questions');
            questions.tf.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `tf-${index}`;
                card.innerHTML = `
                    <div class="question-number">Question ${index + 51}</div>
                    <div class="question-text">${item.q}</div>
                    <div class="options-container">
                        <div class="option-card" onclick="selectOption('tf', ${index}, 0)">TRUE</div>
                        <div class="option-card" onclick="selectOption('tf', ${index}, 1)">FALSE</div>
                    </div>
                    <div class="explanation-box" id="tf-exp-${index}">
                        <div class="explanation-title">💡 Explanation:</div>
                        <div>${item.explanation}</div>
                    </div>
                `;
                tfContainer.appendChild(card);
            });
        }

        // ===== SELECTION TRACKING =====
        const userAnswers = {
            mc: new Array(30).fill(null),
            tf: new Array(10).fill(null)
        };

        function selectOption(type, questionIndex, optionIndex) {
            if (document.getElementById('score-banner').classList.contains('show')) return;
            
            userAnswers[type][questionIndex] = optionIndex;
            
            // Remove selected from all options in this question
            const container = document.getElementById(`${type}-${questionIndex}`);
            const options = container.querySelectorAll('.option-card');
            options.forEach(opt => opt.classList.remove('selected'));
            
            // Add selected to clicked option
            options[optionIndex].classList.add('selected');
        }

        // ===== GRADE ENUMERATION =====
        function gradeEnumeration(userInput, correctAnswers) {
            if (!userInput || userInput.trim() === '') return false;
            
            const userAnswers = userInput.toLowerCase().split(',').map(a => a.trim()).filter(a => a !== '');
            const correctLower = correctAnswers.map(a => a.toLowerCase());
            
            // Check if at least half of the correct answers are present
            let matchCount = 0;
            userAnswers.forEach(userAns => {
                if (correctLower.some(correct => correct.includes(userAns) || userAns.includes(correct))) {
                    matchCount++;
                }
            });
            
            // All-or-nothing: must have at least the minimum required answers
            const requiredCount = Math.min(2, correctAnswers.length);
            return matchCount >= requiredCount;
        }

        // ===== SUBMIT QUIZ =====
        function submitQuiz() {
            let score = 0;
            const total = 60;

            // Grade Multiple Choice
            questions.mc.forEach((item, index) => {
                const card = document.getElementById(`mc-${index}`);
                const options = card.querySelectorAll('.option-card');
                const expBox = document.getElementById(`mc-exp-${index}`);
                
                if (userAnswers.mc[index] === item.answer) {
                    score++;
                    options[item.answer].classList.add('correct');
                } else {
                    if (userAnswers.mc[index] !== null) {
                        options[userAnswers.mc[index]].classList.add('wrong');
                    }
                    options[item.answer].classList.add('correct');
                }
                expBox.classList.add('show');
                options.forEach(opt => opt.style.pointerEvents = 'none');
            });

            // Grade Identification
            questions.id.forEach((item, index) => {
                const input = document.getElementById(`id-input-${index}`);
                const expBox = document.getElementById(`id-exp-${index}`);
                const userAnswer = input.value.toLowerCase().trim();
                
                if (userAnswer === item.answer.toLowerCase()) {
                    score++;
                    input.classList.add('correct');
                } else {
                    input.classList.add('wrong');
                }
                expBox.classList.add('show');
                input.disabled = true;
            });

            // Grade Enumeration
            questions.enum.forEach((item, index) => {
                const input = document.getElementById(`enum-input-${index}`);
                const expBox = document.getElementById(`enum-exp-${index}`);
                const userAnswer = input.value;
                
                if (gradeEnumeration(userAnswer, item.answer)) {
                    score++;
                    input.classList.add('correct');
                } else {
                    input.classList.add('wrong');
                }
                expBox.classList.add('show');
                input.disabled = true;
            });

            // Grade True/False
            questions.tf.forEach((item, index) => {
                const card = document.getElementById(`tf-${index}`);
                const options = card.querySelectorAll('.option-card');
                const expBox = document.getElementById(`tf-exp-${index}`);
                const correctIndex = item.answer ? 0 : 1;
                
                if (userAnswers.tf[index] === correctIndex) {
                    score++;
                    options[correctIndex].classList.add('correct');
                } else {
                    if (userAnswers.tf[index] !== null) {
                        options[userAnswers.tf[index]].classList.add('wrong');
                    }
                    options[correctIndex].classList.add('correct');
                }
                expBox.classList.add('show');
                options.forEach(opt => opt.style.pointerEvents = 'none');
            });

            // Show Score
            const scoreBanner = document.getElementById('score-banner');
            const scoreDisplay = document.getElementById('score-display');
            const scoreMessage = document.getElementById('score-message');
            
            scoreDisplay.textContent = `${score}/${total}`;
            
            if (score >= 50) {
                scoreMessage.textContent = "🎉 Excellent! You're ready for the midterm!";
            } else if (score >= 40) {
                scoreMessage.textContent = "👍 Good job! Keep reviewing!";
            } else {
                scoreMessage.textContent = "📚 Keep practicing! You can do it!";
            }
            
            scoreBanner.classList.add('show');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ===== RETAKE QUIZ =====
        function retakeQuiz() {
            // Reset score banner
            document.getElementById('score-banner').classList.remove('show');
            
            // Reset Multiple Choice
            questions.mc.forEach((item, index) => {
                const card = document.getElementById(`mc-${index}`);
                const options = card.querySelectorAll('.option-card');
                const expBox = document.getElementById(`mc-exp-${index}`);
                
                options.forEach(opt => {
                    opt.classList.remove('selected', 'correct', 'wrong');
                    opt.style.pointerEvents = 'auto';
                });
                expBox.classList.remove('show');
            });
            
            // Reset Identification
            questions.id.forEach((item, index) => {
                const input = document.getElementById(`id-input-${index}`);
                const expBox = document.getElementById(`id-exp-${index}`);
                
                input.value = '';
                input.classList.remove('correct', 'wrong');
                input.disabled = false;
                expBox.classList.remove('show');
            });
            
            // Reset Enumeration
            questions.enum.forEach((item, index) => {
                const input = document.getElementById(`enum-input-${index}`);
                const expBox = document.getElementById(`enum-exp-${index}`);
                
                input.value = '';
                input.classList.remove('correct', 'wrong');
                input.disabled = false;
                expBox.classList.remove('show');
            });
            
            // Reset True/False
            questions.tf.forEach((item, index) => {
                const card = document.getElementById(`tf-${index}`);
                const options = card.querySelectorAll('.option-card');
                const expBox = document.getElementById(`tf-exp-${index}`);
                
                options.forEach(opt => {
                    opt.classList.remove('selected', 'correct', 'wrong');
                    opt.style.pointerEvents = 'auto';
                });
                expBox.classList.remove('show');
            });
            
            // Reset user answers
            userAnswers.mc = new Array(30).fill(null);
            userAnswers.tf = new Array(10).fill(null);
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ===== INITIALIZE =====
        createGlitters();
        renderQuestions();
    </script>
</body>
</html>
